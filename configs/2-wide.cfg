[pipeline]

NF=2    # Fetch Width
NI=16   # Instruction Queue Size
NW=2    # Dispatch width (number of instructions that can be added to reservation stations per cycle)
NR=16   # Reorder Buffer Size
NB=2    # Comon Data Buses (CDB) width (number of instructions that can write back results to the CDB per cycle)
NC=2    # Commit width (number of instructions that can commit from the ROB per cycle)