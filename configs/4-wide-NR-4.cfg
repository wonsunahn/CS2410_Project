[pipeline]

NF=4    # Fetch Width
NI=16   # Instruction Queue Size
NW=4    # Dispatch width (number of instructions that can be added to reservation stations per cycle)
NR=4    # Reorder Buffer Size
NB=4    # Comon Data Buses (CDB) width (number of instructions that can write back results to the CDB per cycle)
NC=4    # Commit width (number of instructions that can commit from the ROB per cycle)